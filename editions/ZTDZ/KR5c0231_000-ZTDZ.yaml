front:
  text: 存神鍊氣銘
  hash: sha256:bcbb451279ad78df3a5912daccd2f35aaf7c0f65a55e1340cd48241e0df2ace2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0231_SJB_000-180458b, image: sjb/18/180458b.png}
body:
  text: 唐思邈孫眞人述夫身爲神氣之窟宅神氣若存身康力健神氣若散身乃死焉若欲存身先安神氣即氣爲神母神爲氣子神氣若俱長生不死若欲安神須鍊元氣氣在身内神安氣海氣海充盈心安神定定若不散身心凝靜靜至定俱身存年永常住道源自然成聖氣通神境神通慧命命住身存合於眞性日月齊齡道成究竟依銘鍊氣欲學此術先須絶粒安心氣海存神丹田攝心靜慮氣海若具自然飽矣專心修者百日小成三年大成初入五時後通七候神靈變化出沒自在峭壁千里去住無礙氣若不散即氣海充盈神靜丹田身心永固自然廽顔駐色變體成仙穩顯自由通靈百變名曰度世號曰眞人天地齊年日月同壽此法不服氣不嚥津不半苦要喫但喫須休即休自在自由無阻無礙五時七候入胎定觀夫學道之人入有五時第一時心動多靜少思縁萬境取捨無常忌慮度量猶如野馬常人心也第二時心靜少動多攝動入靜心多散逸難可制伏攝之勤䇿追道之始第三時心動靜相半心靜似攝心常靜散相半用心勤策漸見調熟第四時心靜多動少攝心漸熟動即攝之專注一境失而遽得第五時心一向純靜有事無事觸亦不動田攝心熟堅散准定從此巳後處顯而入七候任運自得非關作矣第一候宿疾並銷身輕心暢停心人内神靜氣安四大適然六情沉寂心安懸境抱一守中喜悅日新名爲得道第二候超過常限色返童顔形恱心安通靈徹視移居別郡揀地而安鄰里知人勿令舊識第三候延年千載名曰仙人遊諸名山飛行自在青童侍衛玉女歌揚騰躡煙霞緑雲捧足第四候鍊身成氣氣遶身光名曰眞人存亡自在光明自照晝夜常明遊諸洞宫諸仙侍立第五候鍊氣爲神名曰神人變通自在作用無窮力動乾坤移山竭海第六候鍊神合色名曰至人神既通靈色形不定對機施化應物現形第七候身超物外逈出常倫大道玉皇共居靈境聖賢集㑹弘演至眞造化通靈物無不達修行至此方到道源萬行休停名曰究竟今時之人學道日淺曾無一候何得通靈理守愚情保持穢質四時遷運形妄色衰體謝歸空稱爲得道謬矣此胎息定觀是留神駐形之道術在口訣不書於文有徳至人方遇此法細詳留意必獲無疑賢達之人逢斯聖矣存神鍊氣銘
